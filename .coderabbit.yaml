# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US

tone_instructions: "Direct and concise. Flag factual errors and speciesist language only."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true

  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!**/*.generated.*"
    - "!.claude/worktrees/**"

  path_instructions:
    - path: ".claude/**"
      instructions: |
        Scan for hidden Unicode (zero-width spaces, directional overrides, homoglyphs) — Rules File Backdoor attack vector.
        Flag any hook additions that expand scope beyond the declared task.
        No activist identities, investigation operation names, or witness data in instruction files.

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: ["WIP", "DO NOT MERGE"]
    drafts: false
    base_branches: ["main"]
    ignore_usernames: ["dependabot[bot]", "renovate[bot]"]

  pre_merge_checks:
    custom_checks:
      - name: "No speciesist idioms"
        mode: "error"
        instructions: "Fail on speciesist idioms and industry euphemisms. Full rule set: https://github.com/Open-Paws/no-animal-violence"

  tools:
    semgrep:
      enabled: false
    trufflehog:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000

chat:
  auto_reply: true
  art: false

knowledge_base:
  opt_out: true
